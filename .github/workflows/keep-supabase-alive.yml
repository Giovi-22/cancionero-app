name: Keep Supabase Alive

on:
  schedule:
    # Se ejecuta todos los días lunes, miércoles y viernes a las 12:00 UTC
    - cron: '0 12 * * 1,3,5'
  workflow_dispatch: # Permite ejecutar la acción manualmente desde la web de GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer ping a Supabase para evitar suspensión
        run: |
          echo "Haciendo ping a la API de Supabase..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")
          
          echo "Código de respuesta: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Ping exitoso. Supabase detectará actividad."
          else
            echo "⚠️ Ping completado con código $HTTP_STATUS. (Incluso si da error de permisos, cuenta como actividad de red)."
          fi
